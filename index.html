<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forma - Collibra</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #f8f9fa; }
    .header { background: white; padding: 20px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 24px; color: #111827; }
    .logo-dot { color: #00b140; }
    .content { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
    .card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 40px; text-align: center; }
    h1 { color: #111827; margin: 0 0 16px; }
    .success { font-size: 64px; margin: 20px 0; }
    .button { background: #00b140; color: white; padding: 14px 32px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 30px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <span style="color:#00b140">●</span> Forma
    </div>
    <div>Collibra</div>
  </div>

  <div class="content">
    <div class="card">
      <div class="success">✅</div>
      <h1>Welcome back to Forma</h1>
      <p style="color:#6b7280; font-size:18px;">You are now signed in.</p>
      <p style="margin-top:30px; color:#374151;">This is a simulated Forma dashboard for the phishing resistance demonstration.</p>
      <button onclick="alert('This is a demo page. In a real attack, the attacker now has full access.')" class="button">
        Go to Dashboard
      </button>
    </div>
  </div>
</body>
</html>
